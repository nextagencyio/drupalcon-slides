<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrupalCon Slides</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="slide-deck">
      <div class="slide video-slide active">
        <div class="overlay-title">Decoupled vs Monolith</div>
        <video src="/videos/fighter.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">Create new space with MCP</div>
        <video src="/videos/create-simple-blog-claude.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">Install, Import &amp; Deploy to Vercel</div>
        <video src="/videos/install-import-vercel.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">Connect to Vercel</div>
        <video src="/videos/connect-to-vercel.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">Import content with Chatbot</div>
        <video src="/videos/chatbot-content.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">Content Preview</div>
        <video src="/videos/save-layout-changes-preview.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>

      <div class="slide video-slide">
        <div class="overlay-title">One-shot coffee shop</div>
        <video src="/videos/coffee-shop-end-to-end.mp4" muted playsinline></video>
        <div class="progress-bar"><div class="progress-track"><div class="progress-fill"></div></div></div>
      </div>
    </div>

    <nav id="slide-nav"></nav>

    <div id="slide-counter"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
