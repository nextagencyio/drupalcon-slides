<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DrupalCon Slides</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="slide-deck">
      <!-- 1: Title -->
      <div class="slide title-slide active" data-type="title">
        <h1>Decoupled vs Monolith</h1>
      </div>

      <!-- 1: Video -->
      <div class="slide video-slide" data-type="video">
        <video
          src="/videos/fighter.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- 2: Title -->
      <div class="slide title-slide" data-type="title">
        <h1>Install, Import &amp; Deploy to Vercel</h1>
      </div>

      <!-- 2: Video -->
      <div class="slide video-slide" data-type="video">
        <video
          src="/videos/install-import-vercel.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- 3: Title -->
      <div class="slide title-slide" data-type="title">
        <h1>Connect to Vercel</h1>
      </div>

      <!-- 3: Video -->
      <div class="slide video-slide" data-type="video">
        <video
          src="/videos/connect-to-vercel.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- 4: Title -->
      <div class="slide title-slide" data-type="title">
        <h1>Import content with Chatbot</h1>
      </div>

      <!-- 4: Video -->
      <div class="slide video-slide" data-type="video">
        <video
          src="/videos/chatbot-content.mp4"
          muted
          playsinline
        ></video>
      </div>

      <!-- 5: Title -->
      <div class="slide title-slide" data-type="title">
        <h1>One-shot coffee shop</h1>
      </div>

      <!-- 5: Video -->
      <div class="slide video-slide" data-type="video">
        <video
          src="/videos/coffee-shop-end-to-end.mp4"
          muted
          playsinline
        ></video>
      </div>
    </div>

    <div id="slide-counter"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
